<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="login-navbar">

        </nav>
    </header>

    <main class="main">
        <!-- log in page -->
        <section class="log_in">
            <div class="container">
                <div class="log_in__logo">
                    <img src="images/logo-text.png" alt="q-care logo" class="logo__icon">
                </div>

                <div class="log_in__information">
                    <div class="information__username">
                        <img src="images/circle-user.svg" alt="user image" class="information__icon">
                        <input type="text" class="information__input" placeholder="รหัสประจำตัวประชาชน">
                    </div>
    
                    <div class="information__password">
                        <img src="images/lock.svg" alt="password image" class="information__icon">
                        <input type="text" class="information__input" placeholder="รหัสผ่าน">
                    </div>
                </div>

                <div class="log_in__sp-text">
                    <a href="#" class="log_in__forget-password">ลืมรหัสผ่าน</a>
                </div>

                <div class="log_in__btn">
                    <button class="button button-primary">เข้าสู่ระบบ</button>
                    <p class="btn__text">หรือ</p>
                    <button class="button button-primary">ลงทะเบียน</button>
                </div>
            </div>
        </section>

        <!-- chatbot page -->
        <section class="chatbot">

        </section>

        <!-- status page -->
        <section class="status">

        </section>

        <!-- coupon page -->
        <section class="coupon">

        </section>

        <!-- setting page -->
        <section class="setting">

        </section>
    </main>

    <footer class="footer">

    </footer>

    <script src="script.js"></script>
</body>
</html>
